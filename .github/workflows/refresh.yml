name: refresh-restspots

# Monthly rebuild of the rest-stops-with-playgrounds dataset from a fresh OSM snapshot.
on:
  schedule:
    - cron: "0 3 1 * *"   # 03:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      country:
        description: "ISO country code to build"
        default: "DE"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: pixi.toml
          pixi-version: "latest"

      - name: Build dataset
        env:
          COUNTRY: ${{ github.event.inputs.country || 'DE' }}
        run: |
          pixi run python -m restspots.pipeline fetch    --country "$COUNTRY"
          pixi run python -m restspots.pipeline build    --country "$COUNTRY"
          pixi run python -m restspots.pipeline export   --country "$COUNTRY"
          pixi run python -m restspots.pipeline validate --country "$COUNTRY"

      - name: Upload processed dataset
        uses: actions/upload-artifact@v4
        with:
          name: restspots-${{ github.event.inputs.country || 'DE' }}
          path: data/processed/

      # Optionally publish data/processed/*.geojson to GitHub Pages for a stable
      # loadGeoJson() URL (see README "Maps JavaScript API" recipe).
