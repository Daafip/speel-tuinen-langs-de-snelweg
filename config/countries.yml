# Per-country configuration. Adding a new country is a YAML block, not a rewrite:
# the OSM core (highway=services / rest_area + leisure=playground) works for any
# country immediately; `enrichment` connectors are bolted on incrementally.
#
# Fields:
#   iso                            ISO 3166-1 alpha-2 code (also used in output)
#   osm_area                       Overpass area selector for the country boundary
#   geofabrik_url                  dated .osm.pbf extract (Path B, offline/scales)
#   stop_tags                      OSM tags that identify a rest stop
#   playground_proximity_m         buffer (m) for point-mapped stops (proximity rule)
#   playground_contained_buffer_m  edge buffer (m) for area-mapped stops (contained rule)
#   enrichment                     list of connector keys (see restspots.enrich)

DE:
  iso: DE
  osm_area: '["ISO3166-1"="DE"][admin_level=2]'
  geofabrik_url: https://download.geofabrik.de/europe/germany-latest.osm.pbf
  stop_tags:
    highway: [services, rest_area]
  playground_proximity_m: 200
  playground_contained_buffer_m: 50
  enrichment: [autobahn_api]
  labels:
    services: Raststätte
    rest_area: Rastplatz
  # Path B (recommended for DE): pyosmium streams the single 4.8 GB Germany .pbf in one
  # low-memory pass — no need to split it. Run: `... build --country DE --source pbf`.
  # Germany is too heavy for a single Overpass query, so fetch per Bundesland
  # (ISO3166-2) and merge. Each state query is light thanks to the around-playground
  # pre-filter. Remove `regions` to attempt a single-shot query (e.g. via Path B).
  regions:
    - '["ISO3166-2"="DE-BW"]'   # Baden-Württemberg
    - '["ISO3166-2"="DE-BY"]'   # Bayern
    - '["ISO3166-2"="DE-BE"]'   # Berlin
    - '["ISO3166-2"="DE-BB"]'   # Brandenburg
    - '["ISO3166-2"="DE-HB"]'   # Bremen
    - '["ISO3166-2"="DE-HH"]'   # Hamburg
    - '["ISO3166-2"="DE-HE"]'   # Hessen
    - '["ISO3166-2"="DE-MV"]'   # Mecklenburg-Vorpommern
    - '["ISO3166-2"="DE-NI"]'   # Niedersachsen
    - '["ISO3166-2"="DE-NW"]'   # Nordrhein-Westfalen
    - '["ISO3166-2"="DE-RP"]'   # Rheinland-Pfalz
    - '["ISO3166-2"="DE-SL"]'   # Saarland
    - '["ISO3166-2"="DE-SN"]'   # Sachsen
    - '["ISO3166-2"="DE-ST"]'   # Sachsen-Anhalt
    - '["ISO3166-2"="DE-SH"]'   # Schleswig-Holstein
    - '["ISO3166-2"="DE-TH"]'   # Thüringen

