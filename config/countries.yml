# --- M7: multi-country breadth (expansion_plans_UK_DK_ES_IT.md) ---------------
GB:
  iso: GB
  osm_area: '["ISO3166-1"="GB"][admin_level=2]'
  # Path B note: Geofabrik has no single UK extract. We use great-britain
  # (England/Scotland/Wales); Northern Ireland lives in the ireland extract and would
  # need boundary-clipping to avoid pulling in the Republic of Ireland — omitted for now.
  geofabrik_url: https://download.geofabrik.de/europe/great-britain-latest.osm.pbf
  stop_tags:
    highway: [services, rest_area]
  ref_road_tags: [motorway, trunk]   # UK MSAs often sit on trunk A-roads
  playground_proximity_m: 200
  playground_contained_buffer_m: 50
  enrichment: []   # National Highways SRN refs (England only) could enrich later
  facilities: [uk_facilities]   # curated indoor-soft-play seed (OSM is blind to it)
  labels:
    services: Services
    rest_area: Rest area

